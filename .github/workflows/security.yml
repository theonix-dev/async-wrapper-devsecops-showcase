name: DevSecOps Security Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-scan:
    name: Security Audits (SAST and SCA)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'

    - name: Install Security Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit pip-audit ruff

    - name: Run Linter and Code Quality Scan (Ruff)
      run: |
        ruff check .

    - name: Run Static Application Security Testing (SAST - Bandit)
      run: |
        # Scan code for vulnerabilities (excluding virtual environments and scratch files)
        bandit -r . -ll -ii -x ./.venv,./scratch

    - name: Run Software Composition Analysis (SCA - pip-audit)
      run: |
        # Audit requirements.txt dependencies for known CVEs using pip-audit
        pip-audit -r requirements.txt

